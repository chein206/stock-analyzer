name: 주가 알림 & 정기 보고

# 평일 8:00~20:00 KST (UTC 23:00~11:00) 30분마다 실행
# → 알림 체크는 매 실행, 정기 보고는 설정 파일 기준으로 간격 판단
on:
  schedule:
    - cron: '0,30 23 * * 0-4'    # UTC 23:00, 23:30 (KST 다음날 8:00, 8:30) 일~목
    - cron: '0,30 0-10 * * 1-5'  # UTC 0~10시 (KST 9~19시) 월~금
    - cron: '0 11 * * 1-5'       # UTC 11:00 (KST 20:00) 마지막 체크
  workflow_dispatch:              # 수동 실행 (테스트용)

permissions:
  contents: write

jobs:
  check-and-report:
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4
        with:
          # 다른 job이 커밋한 최신 상태를 가져오기 위해
          fetch-depth: 1

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: 패키지 설치
        run: pip install --quiet requests FinanceDataReader pandas pytz yfinance

      - name: 목표가·손절가 알림 체크
        env:
          KAKAO_ACCESS_TOKEN: ${{ secrets.KAKAO_ACCESS_TOKEN }}
        run: python scripts/check_alerts.py

      - name: 정기 현재가 보고
        env:
          KAKAO_ACCESS_TOKEN: ${{ secrets.KAKAO_ACCESS_TOKEN }}
        run: python scripts/hourly_report.py

      - name: 상태 파일 커밋 (변경 시에만)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/price_alerts.json data/last_report_sent.json 2>/dev/null || true
          git diff --staged --quiet && echo "변경 없음" || (
            git commit -m "chore: update alert/report state [skip ci]" &&
            git push
          )
